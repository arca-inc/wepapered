name: Bundle release

# Build all four wepapered binaries (including the daemon, which links the
# private LWE library) and publish a single installable bundle: daemon + gui +
# settings + ctl colocated with the LWE runtime (libcef, engine, resources).
#
# The daemon needs the private arca-inc/lwe-patched repo for its headers
# (lwe/src) and prebuilt output (downloaded from lwe's `latest` release), so a
# PAT with read access to lwe-patched must be stored as the LWE_ACCESS_TOKEN
# secret. The default GITHUB_TOKEN cannot read another private repo.
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-24.04
    steps:
      # Use the PAT so the private lwe submodule (for headers) clones too.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.LWE_ACCESS_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev patchelf file \
            libmpv2 libsdl2-2.0-0 libglew2.2 libglfw3 freeglut3-dev libglu1-mesa-dev \
            libavcodec60 libavformat60 libavutil58 libswscale7 \
            libpulse0 liblz4-1 libfftw3-double3 libfreetype6 \
            libnss3 libnspr4

      # Pull the prebuilt LWE runtime from lwe's rolling `latest` release into
      # lwe/build/output (the daemon's cgo LDFLAGS point there).
      - name: Fetch prebuilt LWE output
        env:
          GH_TOKEN: ${{ secrets.LWE_ACCESS_TOKEN }}
        run: |
          gh release download latest -R arca-inc/lwe-patched \
            -p 'lwe-output-linux-amd64.tar.gz' -O lwe-output.tar.gz
          mkdir -p lwe/build
          tar -xzf lwe-output.tar.gz -C lwe/build
          ls lwe/build/output/linux-wallpaperengine lwe/build/output/liblinux-wallpaperengine-lib.so

      # The daemon links libcef, whose chromium NEEDED libs we don't install in
      # CI; relax the link-time check (this is a build-only runner — the bundle's
      # real runtime deps are the system packages listed in the README/PKGBUILD).
      - name: Build all binaries
        env:
          CGO_LDFLAGS: -Wl,--allow-shlib-undefined
        run: make

      - name: Assemble bundle
        run: |
          set -euo pipefail
          mkdir -p dist/wepapered
          cp bin/wepapered-daemon bin/wepapered-gui bin/wepapered-settings bin/wepaperedctl dist/wepapered/
          # Colocate the LWE runtime next to the binaries (paths.go expects
          # linux-wallpaperengine to sit beside the executable in a packaged install).
          cp -a lwe/build/output/. dist/wepapered/

          # Make the bundle self-contained across distros: copy the *media* library
          # closure (ffmpeg + mpv + their codecs) next to the binaries. The runner
          # is ubuntu-24.04 (FFmpeg 6); other distros ship different sonames
          # (e.g. Gentoo FFmpeg 7), so without this the engine can't load.
          #
          # libmpv is bundled too, so it uses the SAME bundled ffmpeg as the engine
          # (two ffmpeg majors in one process would clash). The graphics/display and
          # core system stack is intentionally KEPT on the host — bundling GL
          # drivers, wayland/X, glibc, gtk/webkit, nss or audio breaks portability.
          EXCLUDE='^(ld-linux|libc\.|libm\.|libdl\.|libpthread|librt\.|libresolv|libutil\.|libstdc\+\+|libgcc_s|libGL|libEGL|libGLES|libOpenGL|libglapi|libgbm|libdrm|libwayland|libxkbcommon|libX|libxcb|libICE|libSM|libdbus|libsystemd|libudev|libselinux|libcap|libgio-2|libglib-2|libgobject|libgmodule|libgthread|libgtk-|libgdk|libwebkit2gtk|libjavascriptcoregtk|libpango|libcairo|libgdk_pixbuf|libatk|libepoxy|libfontconfig|libfreetype|libharfbuzz|libfribidi|libthai|libdatrie|libgraphite2|libasound|libpulse|libnss|libnspr|libplc|libplds|libsmime|libva|libvdpau|libz\.|libbz2|liblzma|libzstd|libcrypto|libssl|libgnutls|libp11-kit|libtasn1|libidn2|libunistring|libffi|libpcre|libmount|libblkid|libuuid|libgcrypt|libgpg-error)'

          # Resolve the closure with the in-bundle libs visible (so only the
          # remaining => /usr/... system libs are candidates to bundle).
          closure=$( { LD_LIBRARY_PATH=dist/wepapered ldd \
              dist/wepapered/wepapered-daemon \
              dist/wepapered/linux-wallpaperengine \
              dist/wepapered/lwe-cef-subprocess \
              || true; } 2>/dev/null | awk '/=> \//{print $3}' | sort -u)
          while read -r lib; do
            [ -n "$lib" ] && [ -f "$lib" ] || continue
            base=$(basename "$lib")
            if printf '%s\n' "$base" | grep -Eq "$EXCLUDE"; then continue; fi
            if [ -e "dist/wepapered/$base" ]; then continue; fi   # already in the bundle
            cp -L "$lib" "dist/wepapered/$base"
            echo "bundled: $base"
          done <<< "$closure"

          # Self-contain: every ELF resolves its colocated deps via $ORIGIN.
          for f in dist/wepapered/*; do
            [ -f "$f" ] || continue
            if file "$f" | grep -q ELF; then patchelf --set-rpath '$ORIGIN' "$f" || true; fi
          done

          tar -czf wepapered-linux-amd64.tar.gz -C dist wepapered
          du -sh dist/wepapered

      - name: Verify no missing media libs
        run: |
          # With the host's media libs removed from the search path, the engine
          # must still resolve everything from $ORIGIN — proving portability.
          cd dist/wepapered
          miss=$(ldd ./linux-wallpaperengine 2>/dev/null | grep -i 'not found' \
                 | grep -viE 'libGL|libEGL|libwayland|libX|libgbm|libdrm|libasound|libpulse' || true)
          if [ -n "$miss" ]; then echo "MISSING media libs:"; echo "$miss"; exit 1; fi
          echo "OK: media closure self-contained"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wepapered-bundle-linux-amd64
          path: wepapered-linux-amd64.tar.gz

      - name: Refresh rolling latest release
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest -R ${{ github.repository }} --yes --cleanup-tag || true

      - name: Publish latest (rolling)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: wepapered-linux-amd64.tar.gz

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wepapered-linux-amd64.tar.gz
