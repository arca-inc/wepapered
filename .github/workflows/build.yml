name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # The lwe submodule (arca-inc/lwe-patched) is private, and the default
    # GITHUB_TOKEN cannot clone a different private repo, so it is intentionally
    # NOT fetched here (fetching it aborts checkout). Only wepapered-daemon links
    # it; the other three binaries import only internal/core (pure Go) plus their
    # own GTK/webkit and build without it. Building the daemon in CI (private
    # submodule access + the LWE library build) is tracked in TODO.md.
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

    - name: Build binaries (everything except the daemon, which needs the private LWE submodule)
      run: make ctl settings gui

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wepapered-linux-amd64
        path: bin/
